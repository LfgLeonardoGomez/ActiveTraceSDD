# OpenSpec Configuration — ActiveTraceSDD
# Auto-generated by sdd-init. Do not edit manually.
context: >
  activia-trace is a multi-tenant academic management and traceability
  platform orchestrating Moodle data. Consolidates grades, detects delays,
  manages outbound communication with approval workflows, teaching teams,
  encounters, colloquiums, fee liquidations, and full audit trails.
stack:
  backend:
    language: Python 3.13
    framework: FastAPI (async)
    orm: SQLAlchemy 2.0 async
    db: PostgreSQL + Alembic
    validation: Pydantic v2
    auth: JWT + Argon2id + AES-256 at rest
  frontend:
    framework: React 18 + TypeScript (planned, not yet created)
    bundler: Vite
    server_state: TanStack Query
    styling: Tailwind CSS
  infra:
    containers: Docker + docker-compose
    deploy: Easypanel
    observability: OpenTelemetry
strict_tdd: true
testing:
  runner: pytest
  framework: pytest 8.3+ with pytest-asyncio
  layers:
    unit: false
    integration: true
    e2e: false
  tools:
    coverage: pytest-cov
    linter: null
    type_checker: null
    formatter: null
  requirements:
    min_line_coverage: 80
    min_business_rule_coverage: 90
coverage_command: pytest --cov=app --cov-report=term-missing
